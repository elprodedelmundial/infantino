<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-tertiary: #1a1a1d;
            --accent: #e8ff47;
            --accent-dim: #c4d93c;
            --text-primary: #fafafa;
            --text-secondary: #8a8a8e;
            --text-muted: #5a5a5e;
            --border: #2a2a2d;
            --error: #ff6b6b;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
            background: 
                radial-gradient(circle at 20% 80%, rgba(232, 255, 71, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(232, 255, 71, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(232, 255, 71, 0.03) 0%, transparent 60%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark svg {
            width: 100%;
            height: 100%;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--accent);
        }

        /* Toolbar buttons */
        .toolbar-actions {
            display: flex;
            gap: 12px;
        }

        .toolbar-btn {
            padding: 12px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .toolbar-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232, 255, 71, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .toolbar-btn:hover::before {
            left: 100%;
        }

        .toolbar-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px rgba(232, 255, 71, 0.1);
        }

        .toolbar-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* Main content */
        .main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 40px 60px;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            animation: fadeUp 0.8s ease-out 0.3s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hero logo section */
        .hero-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .hero-mark {
            width: 120px;
            height: 120px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(232, 255, 71, 0.3)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 40px rgba(232, 255, 71, 0.5)); }
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            margin-left: 0.3em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Login form */
        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.8s ease-out 0.5s both;
        }

        .login-card {
            background: rgba(17, 17, 19, 0.6);
            border: 1px solid var(--border);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 255, 71, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn-primary:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            background: var(--accent-dim);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(232, 255, 71, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .form-footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Tab switching */
        .form-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .form-tab {
            flex: 1;
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-tab:first-child {
            border-right: 1px solid var(--border);
        }

        .form-tab.active {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        .form-tab:hover:not(.active) {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0 20px;
                height: 60px;
            }

            .logo-text {
                font-size: 1.2rem;
            }

            .toolbar-btn {
                padding: 10px 16px;
                font-size: 0.65rem;
            }

            .main {
                padding: 100px 20px 40px;
            }

            .hero-mark {
                width: 80px;
                height: 80px;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .login-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="grid-overlay"></div>

    <!-- Toolbar -->
    <nav class="toolbar">
        <a href="#" class="logo">
            <div class="logo-mark">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="36" height="36" stroke="#e8ff47" stroke-width="2"/>
                    <rect x="8" y="8" width="10" height="24" fill="#e8ff47"/>
                    <circle cx="27" cy="20" r="6" stroke="#e8ff47" stroke-width="2"/>
                </svg>
            </div>
            <span class="logo-text">PROD<span>E</span></span>
        </a>
        <div class="toolbar-actions">
            <button class="toolbar-btn active">Option A</button>
            <button class="toolbar-btn">Option B</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="content-wrapper">
            <!-- Hero Logo -->
            <div class="hero-logo">
                <div class="hero-mark">
                    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="5" width="110" height="110" stroke="#e8ff47" stroke-width="3"/>
                        <rect x="20" y="20" width="30" height="80" fill="#e8ff47"/>
                        <circle cx="80" cy="60" r="22" stroke="#e8ff47" stroke-width="3"/>
                        <rect x="5" y="5" width="20" height="20" fill="#e8ff47"/>
                        <rect x="95" y="95" width="20" height="20" fill="#e8ff47"/>
                    </svg>
                </div>
                <h1 class="hero-title">PRODE</h1>
                <p class="hero-tagline">Predict · Compete · Win</p>
            </div>

            <!-- Login Form -->
            <div class="login-container">
                <div class="login-card">
                    <div class="form-tabs">
                        <button class="form-tab active" onclick="switchTab('login')">Sign In</button>
                        <button class="form-tab" onclick="switchTab('register')">Register</button>
                    </div>

                    <form id="authForm">
                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                            <label class="form-label" for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
                    </form>

                    <div class="form-footer">
                        <p id="footerText">Don't have an account? <a href="#" onclick="switchTab('register'); return false;">Create one</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentTab = 'login';

        function switchTab(tab) {
            currentTab = tab;
            const tabs = document.querySelectorAll('.form-tab');
            const confirmGroup = document.getElementById('confirmPasswordGroup');
            const submitBtn = document.getElementById('submitBtn');
            const footerText = document.getElementById('footerText');

            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                confirmGroup.style.display = 'none';
                submitBtn.textContent = 'Sign In';
                footerText.innerHTML = 'Don\'t have an account? <a href="#" onclick="switchTab(\'register\'); return false;">Create one</a>';
            } else {
                tabs[1].classList.add('active');
                confirmGroup.style.display = 'block';
                submitBtn.textContent = 'Create Account';
                footerText.innerHTML = 'Already have an account? <a href="#" onclick="switchTab(\'login\'); return false;">Sign in</a>';
            }
        }

        // Toolbar button interaction
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Form submission
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (currentTab === 'register') {
                const confirmPassword = document.getElementById('confirmPassword').value;
                if (password !== confirmPassword) {
                    alert('Passwords do not match!');
                    return;
                }
                console.log('Registering:', email);
                alert('Registration successful! Welcome to PRODE.');
            } else {
                console.log('Signing in:', email);
                alert('Sign in successful! Welcome back to PRODE.');
            }
        });
    </script>
</body>
</html>
