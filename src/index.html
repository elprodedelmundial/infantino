<!DOCTYPE html>
<html lang="en">
<head>

  <script>
    // iOS standalone PWAs can preserve pinch zoom between launches unless gestures are blocked.
    ['gesturestart', 'gesturechange', 'gestureend'].forEach((eventName) => {
      document.addEventListener(eventName, (event) => event.preventDefault(), { passive: false });
    });
  </script>
  <!-- Runtime configuration - edit config.js to set the grondona API URL -->
  <script src="config.js"></script>
