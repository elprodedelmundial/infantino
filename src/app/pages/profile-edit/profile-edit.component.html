<app-user-toolbar [username]="username"></app-user-toolbar>

<main class="main">
  <div class="content-wrapper">
    <div class="page-header">
      <button class="back-btn" (click)="goBack()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver
      </button>
      <h1 class="page-title">Editar Perfil</h1>
    </div>

    <!-- Messages -->
    <div class="message success" *ngIf="successMessage">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 9L7.5 12.5L14 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      {{ successMessage }}
    </div>
    <div class="message error" *ngIf="errorMessage">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9 5.5V9.5M9 12.5V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {{ errorMessage }}
    </div>

    <div class="profile-container" *ngIf="!isLoading">
      <!-- Avatar Section -->
      <div class="avatar-section">
        <div class="avatar-preview" [class.has-image]="avatarUrl">
          <img *ngIf="avatarUrl" [src]="avatarUrl" alt="Avatar">
          <span *ngIf="!avatarUrl" class="avatar-initials">{{ initials }}</span>
        </div>
        <div class="avatar-actions">
          <div class="form-group">
            <label class="form-label">URL de imagen de perfil</label>
            <input 
              type="url" 
              class="form-input"
              [(ngModel)]="avatarUrl"
              placeholder="https://ejemplo.com/imagen.jpg">
          </div>
          <p class="avatar-hint">Ingresa la URL de una imagen para tu perfil</p>
        </div>
      </div>

      <!-- Profile Form -->
      <form class="profile-form" (ngSubmit)="saveProfile()">
        <div class="form-group">
          <label class="form-label" for="fullName">Nombre Completo *</label>
          <input 
            type="text" 
            id="fullName"
            class="form-input"
            [(ngModel)]="fullName"
            name="fullName"
            placeholder="Tu nombre completo"
            required>
        </div>

        <div class="form-group">
          <label class="form-label" for="username">Nombre de Usuario *</label>
          <input 
            type="text" 
            id="username"
            class="form-input"
            [(ngModel)]="editUsername"
            name="username"
            placeholder="tu_usuario"
            required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico *</label>
          <input 
            type="email" 
            id="email"
            class="form-input"
            [(ngModel)]="email"
            name="email"
            placeholder="tu@ejemplo.com"
            required>
        </div>

        <button type="submit" class="btn-primary" [disabled]="isSaving">
          <span class="spinner-small" *ngIf="isSaving"></span>
          {{ isSaving ? 'Guardando...' : 'Guardar Cambios' }}
        </button>
      </form>

      <!-- Password Section -->
      <div class="password-section">
        <div class="section-header" (click)="togglePasswordForm()">
          <h3>Cambiar Contraseña</h3>
          <svg [class.open]="showPasswordForm" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <form class="password-form" *ngIf="showPasswordForm" (ngSubmit)="changePassword()">
          <div class="form-group">
            <label class="form-label" for="currentPassword">Contraseña Actual</label>
            <input 
              type="password" 
              id="currentPassword"
              class="form-input"
              [(ngModel)]="currentPassword"
              name="currentPassword"
              placeholder="••••••••">
          </div>

          <div class="form-group">
            <label class="form-label" for="newPassword">Nueva Contraseña</label>
            <input 
              type="password" 
              id="newPassword"
              class="form-input"
              [(ngModel)]="newPassword"
              name="newPassword"
              placeholder="••••••••">
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirmar Nueva Contraseña</label>
            <input 
              type="password" 
              id="confirmPassword"
              class="form-input"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••">
          </div>

          <button type="submit" class="btn-secondary" [disabled]="isChangingPassword">
            <span class="spinner-small" *ngIf="isChangingPassword"></span>
            {{ isChangingPassword ? 'Cambiando...' : 'Cambiar Contraseña' }}
          </button>
        </form>
      </div>
    </div>

    <div class="loading-state" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Cargando perfil...</p>
    </div>
  </div>
</main>
