<app-user-toolbar [username]="username"></app-user-toolbar>

<app-awards-reminder
  *ngIf="showAwardsReminder"
  [username]="username"
  (closed)="showAwardsReminder = false">
</app-awards-reminder>

<main class="main">
  <div class="content-wrapper">
    <div class="main-buttons">
      <button class="main-btn results" (click)="goToResults()">
        <div class="btn-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/>
            <path d="M24 14V24L30 30" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">RESULTADOS</span>
          <span class="btn-description">Partidos en vivo y próximos encuentros</span>
        </div>
        <svg class="btn-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="main-btn tournaments" (click)="goToMyTournaments()">
        <div class="btn-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <path d="M24 8L28.09 18.26L39.27 19.27L30.64 26.14L33.18 37.05L24 31.27L14.82 37.05L17.36 26.14L8.73 19.27L19.91 18.26L24 8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">GRUPOS</span>
          <span class="btn-description">Tus grupos y predicciones</span>
        </div>
        <svg class="btn-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="main-btn rules" (click)="goToRules()">
        <div class="btn-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="10" y="6" width="28" height="36" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M17 16H31" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M17 23H31" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M17 30H24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="btn-content">
          <span class="btn-title">REGLAS</span>
          <span class="btn-description">Cómo se puntúa y cómo ganar</span>
        </div>
        <svg class="btn-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</main>

<!-- Forced password change banner, hovering over the dashboard -->
<div
  class="password-reset-overlay"
  *ngIf="passwordResetRequired"
  role="dialog"
  aria-modal="true"
  aria-label="Cambiá tu contraseña">
  <div class="password-reset-backdrop" aria-hidden="true"></div>
  <div class="password-reset-panel">
    <div class="password-reset-panel__icon" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="6" y="12" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M9.5 12V8.5C9.5 6.01 11.51 4 14 4C16.49 4 18.5 6.01 18.5 8.5V12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <h2 class="password-reset-panel__title">Cambiá tu contraseña</h2>
    <p class="password-reset-panel__message">
      Por seguridad, necesitás <strong>establecer una nueva contraseña</strong> antes de continuar.
    </p>

    <form (ngSubmit)="submitPasswordReset()">
      <div class="form-group">
        <label class="form-label" for="newPassword">Nueva Contraseña</label>
        <input
          type="password"
          id="newPassword"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="newPassword"
          name="newPassword"
          autocomplete="new-password"
          required>
        <span class="form-hint">Mínimo 6 caracteres</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmNewPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmNewPassword"
          class="form-input"
          placeholder="••••••••"
          [(ngModel)]="confirmNewPassword"
          name="confirmNewPassword"
          autocomplete="new-password"
          required>
      </div>

      <div class="error-message" *ngIf="passwordResetError">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 5V8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="11" r="0.75" fill="currentColor"/>
        </svg>
        {{ passwordResetError }}
      </div>

      <button type="submit" class="password-reset-submit" [disabled]="isPasswordResetSubmitting">
        <span class="spinner-small" *ngIf="isPasswordResetSubmitting"></span>
        Guardar contraseña
      </button>
    </form>
  </div>
</div>
