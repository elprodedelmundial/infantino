<app-user-toolbar [username]="username"></app-user-toolbar>

<main class="main">
  <div class="content-wrapper">
    <section class="profile-card" *ngIf="!isLoading; else loading">
      <div class="profile-avatar">
        <span>{{ initials }}</span>
      </div>
      <h1 class="profile-name">{{ displayName }}</h1>
      <p class="profile-handle">{{ handle }}</p>
      <p class="profile-status">Página en construcción</p>
    </section>

    <ng-template #loading>
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Cargando perfil...</p>
      </div>
    </ng-template>
  </div>
</main>
