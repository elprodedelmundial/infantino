<div class="login-container">
  <div class="login-card">
    <div class="form-tabs">
      <button 
        class="form-tab" 
        [class.active]="isLogin"
        (click)="switchTab('login')">
        Iniciar Sesión
      </button>
      <button 
        class="form-tab" 
        [class.active]="isRegister"
        (click)="switchTab('register')">
        Registrarse
      </button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <!-- Register: Full Name -->
      <div class="form-group" *ngIf="isRegister">
        <label class="form-label" for="fullName">
          Nombre Completo <span class="required">*</span>
        </label>
        <input 
          type="text" 
          id="fullName" 
          class="form-input" 
          placeholder="Juan Pérez"
          [(ngModel)]="fullName"
          name="fullName"
          autocomplete="name">
      </div>

      <!-- Register: Username (Required) -->
      <div class="form-group" *ngIf="isRegister">
        <label class="form-label" for="username">
          Nombre de Usuario <span class="required">*</span>
        </label>
        <input 
          type="text" 
          id="username" 
          class="form-input" 
          [class.input-error]="hasFieldError('username')"
          placeholder="juanperez"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
          pattern="[a-zA-Z0-9_]+"
          required
          minlength="3">
        <span class="form-hint">Mínimo 3 caracteres. Solo letras, números y guión bajo</span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">
          Correo Electrónico <span class="required" *ngIf="isRegister">*</span>
        </label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          [class.input-error]="hasFieldError('email')"
          placeholder="tu@ejemplo.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">
          Contraseña <span class="required" *ngIf="isRegister">*</span>
        </label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          [autocomplete]="isLogin ? 'current-password' : 'new-password'"
          required>
        <span class="form-hint" *ngIf="isRegister">Mínimo 6 caracteres</span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group" *ngIf="isRegister">
        <label class="form-label" for="confirmPassword">
          Confirmar Contraseña <span class="required">*</span>
        </label>
        <input 
          type="password" 
          id="confirmPassword" 
          class="form-input" 
          placeholder="••••••••"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          autocomplete="new-password">
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 5V8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="11" r="0.75" fill="currentColor"/>
        </svg>
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        <span class="spinner-small" *ngIf="isSubmitting"></span>
        {{ isLogin ? 'Iniciar Sesión' : 'Crear Cuenta' }}
      </button>
    </form>

    <div class="form-footer">
      <p *ngIf="isLogin">
        ¿No tienes cuenta? 
        <a href="#" (click)="switchTab('register'); $event.preventDefault()">Crear una</a>
      </p>
      <p *ngIf="isRegister">
        ¿Ya tienes cuenta? 
        <a href="#" (click)="switchTab('login'); $event.preventDefault()">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
